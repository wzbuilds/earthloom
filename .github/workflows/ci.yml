name: Validate product iteration

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: product-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - name: Export the GitHub Pages edition
        run: npm run build:pages
        env:
          GITHUB_PAGES: true
          NEXT_PUBLIC_SITE_URL: https://wzbuilds.github.io/earthloom
